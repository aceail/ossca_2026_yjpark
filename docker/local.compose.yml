# Local 모드 운영용 docker-compose.
# 같은 머신에 Ollama·SQLite·우리 backend·frontend + Sprint 27 Phoenix 한 번에 띄움.

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: naeil-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 할당 (CDI via deploy.resources). Compose v5는 top-level devices: 필드가
    # CDI ID를 안 받으므로 deploy.resources.reservations.devices가 정공법.
    # OLLAMA_GPU_ID로 호스트의 nvidia.com/gpu=N 인덱스 지정 (기본 0). 호스트
    # CDI 등록 인덱스는 `docker info | grep cdi`로 확인 가능.
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=${OLLAMA_GPU_ID:-0}
    healthcheck:
      # ollama image lacks curl/wget; `ollama list` exits 0 once the daemon is ready.
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5

  phoenix:
    # Sprint 27: Agent Trace Console. Self-hosted Arize Phoenix.
    image: arizephoenix/phoenix:latest
    container_name: naeil-phoenix
    restart: unless-stopped
    ports:
      # Loopback bind only — UI is for the developer on this host.
      - "127.0.0.1:6006:6006"
    volumes:
      - phoenix_data:/data
    environment:
      PHOENIX_WORKING_DIR: /data

  onlyoffice:
    # Sprint 34: in-browser docx/pptx editing. Self-hosted OnlyOffice DocServer CE.
    image: onlyoffice/documentserver:latest
    container_name: naeil-onlyoffice
    restart: unless-stopped
    ports:
      # 0.0.0.0 — 브라우저가 다른 머신에서 SSH tunnel로 접근할 수 있게.
      # 보안: backend JWT 검증 + 2h 만료라 토큰 없이는 쓸 수 없음.
      - "${TOMORROW_YOU_OO_PORT:-8090}:80"
    environment:
      # JWT 보호 활성화 — backend가 같은 secret으로 서명/검증.
      JWT_ENABLED: "true"
      JWT_SECRET: ${TOMORROW_YOU_OO_JWT_SECRET:-change-me-in-prod-32bytes-please}
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: naeil-backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      phoenix:
        condition: service_started
      onlyoffice:
        condition: service_started
    environment:
      TOMORROW_YOU_DB: /data/tomorrow_you.db
      # Sprint 34: OnlyOffice WOPI integration
      TOMORROW_YOU_OO_JWT_SECRET: ${TOMORROW_YOU_OO_JWT_SECRET:-change-me-in-prod-32bytes-please}
      # 브라우저가 OnlyOffice api.js를 받을 외부 URL (사용자가 보는 origin)
      TOMORROW_YOU_OO_PUBLIC_URL: ${TOMORROW_YOU_OO_PUBLIC_URL:-http://localhost:${TOMORROW_YOU_OO_PORT:-8090}}
      # OnlyOffice가 backend에 접근할 내부 docker network URL
      TOMORROW_YOU_BACKEND_INTERNAL_URL: http://backend:8001
      # backend가 OnlyOffice cache에 접근할 내부 docker URL — callback의
      # localhost:8090을 이걸로 치환해서 fetch.
      TOMORROW_YOU_OO_INTERNAL_URL: http://onlyoffice
      NAEIL_AGENT_MODEL: ${NAEIL_AGENT_MODEL:-qwen3:8b}
      NAEIL_AGENT_TOOLS: "1"
      NAEIL_WATCH_INTERVAL_MIN: ${NAEIL_WATCH_INTERVAL_MIN:-30}
      NAEIL_FOLLOWUP_INTERVAL_MIN: ${NAEIL_FOLLOWUP_INTERVAL_MIN:-60}
      NAEIL_REFLECTION_INTERVAL_HOURS: ${NAEIL_REFLECTION_INTERVAL_HOURS:-12}
      NAEIL_VAPID_PUBLIC_KEY: ${NAEIL_VAPID_PUBLIC_KEY:-}
      NAEIL_VAPID_PRIVATE_KEY: ${NAEIL_VAPID_PRIVATE_KEY:-}
      NAEIL_VAPID_SUBJECT: ${NAEIL_VAPID_SUBJECT:-mailto:admin@example.com}
      TOMORROW_YOU_FERNET_PASSPHRASE: ${TOMORROW_YOU_FERNET_PASSPHRASE:-}
      OLLAMA_HOST: http://ollama:11434
      # 작업물 follow-up: host의 폴더를 backend가 동일 경로로 볼 수 있게.
      HOST_HOME: ${HOME}
      # Sprint 27: tracing
      TOMORROW_YOU_TRACING_ENABLED: ${TOMORROW_YOU_TRACING_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:6006/v1/traces
      OTEL_SERVICE_NAME: tomorrow-you-backend
      TOMORROW_YOU_ENV: ${TOMORROW_YOU_ENV:-dev}
    volumes:
      - naeil_data:/data
      # Host home read-only so user-typed paths (~/Desktop/work) resolve to
      # the same absolute path inside the container via HOST_HOME env var.
      - ${HOME}:${HOME}:ro
    ports:
      # Host port overridable for environments where :8001 is taken (env: TOMORROW_YOU_BACKEND_PORT).
      - "${TOMORROW_YOU_BACKEND_PORT:-8001}:8001"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:${TOMORROW_YOU_BACKEND_PORT:-8001}}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NAEIL_VAPID_PUBLIC_KEY:-}
    container_name: naeil-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  ollama_data:
  naeil_data:
  phoenix_data:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_cache:
